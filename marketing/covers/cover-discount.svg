<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">满减精算型封面</title>
  <desc id="desc">用于传播满减精算型饭桶人格的封面</desc>
  <rect width="900" height="1200" fill="#fffaf0"/>
  <rect x="48" y="48" width="804" height="1104" rx="28" fill="#fffdf7" stroke="#202723" stroke-opacity=".16" stroke-width="3"/>
  <rect x="90" y="110" width="250" height="64" rx="12" fill="#d89b23"/>
  <text x="118" y="153" fill="#fffaf0" font-size="32" font-weight="950" font-family="PingFang SC, Microsoft YaHei, sans-serif">传播热度 98</text>
  <text x="90" y="310" fill="#202723" font-size="92" font-weight="950" font-family="PingFang SC, Microsoft YaHei, sans-serif">满减不是</text>
  <text x="90" y="420" fill="#202723" font-size="92" font-weight="950" font-family="PingFang SC, Microsoft YaHei, sans-serif">优惠</text>
  <text x="90" y="560" fill="#a73524" font-size="54" font-weight="950" font-family="PingFang SC, Microsoft YaHei, sans-serif">是智力对局</text>
  <text x="90" y="690" fill="#47524c" font-size="42" font-weight="800" font-family="PingFang SC, Microsoft YaHei, sans-serif">测出来我沉默了</text>
  <rect x="90" y="840" width="720" height="128" rx="18" fill="#2f725d"/>
  <text x="130" y="922" fill="#fffaf0" font-size="48" font-weight="950" font-family="PingFang SC, Microsoft YaHei, sans-serif">满减精算型集合</text>
  <text x="90" y="1070" fill="#47524c" font-size="30" font-weight="800" font-family="PingFang SC, Microsoft YaHei, sans-serif">饭桶研究所 · FBI 饭桶行为识别报告</text>
</svg>
