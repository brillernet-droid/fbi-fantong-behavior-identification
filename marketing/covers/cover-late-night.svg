<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">夜宵复活型封面</title>
  <desc id="desc">用于传播夜宵复活型饭桶人格的封面</desc>
  <rect width="900" height="1200" fill="#202723"/>
  <rect x="48" y="48" width="804" height="1104" rx="28" fill="#2f3832" stroke="#fffaf0" stroke-opacity=".18" stroke-width="3"/>
  <circle cx="704" cy="202" r="110" fill="#d89b23" opacity=".8"/>
  <circle cx="704" cy="202" r="82" fill="#2f3832"/>
  <text x="90" y="150" fill="#ffd28a" font-size="38" font-weight="900" font-family="PingFang SC, Microsoft YaHei, sans-serif">夜宵复活型</text>
  <text x="90" y="330" fill="#fffaf0" font-size="88" font-weight="950" font-family="PingFang SC, Microsoft YaHei, sans-serif">白天打工</text>
  <text x="90" y="440" fill="#fffaf0" font-size="88" font-weight="950" font-family="PingFang SC, Microsoft YaHei, sans-serif">晚上复活</text>
