  <rect x="90" y="840" width="720" height="128" rx="18" fill="#d94d32"/>
  <text x="130" y="922" fill="#fffaf0" font-size="48" font-weight="950" font-family="PingFang SC, Microsoft YaHei, sans-serif">夜宵局开测</text>
  <text x="90" y="1070" fill="#d7c7ad" font-size="30" font-weight="800" font-family="PingFang SC, Microsoft YaHei, sans-serif">饭桶研究所 · FBI 饭桶行为识别报告</text>
</svg>
